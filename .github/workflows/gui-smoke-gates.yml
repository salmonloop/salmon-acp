name: GUI Smoke Gates

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

env:
  SALMONEGG_GUI: "1"

jobs:
  deterministic-gui-smokes:
    name: Deterministic GUI Smoke Gates
    runs-on: [self-hosted, windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build GUI tests
        run: dotnet build tests/SalmonEgg.GuiTests.Windows/SalmonEgg.GuiTests.Windows.csproj -v minimal

      - name: Gate Random 1s Cadence (Single Profile)
        run: >
          dotnet test tests/SalmonEgg.GuiTests.Windows/SalmonEgg.GuiTests.Windows.csproj
          --filter "FullyQualifiedName~RandomSwitchWithOneSecondCadence_FinalSelectionAlwaysDrivesRightPane"
          -v minimal

      - name: Gate Random 1s Cadence (Cross Profile)
        run: >
          dotnet test tests/SalmonEgg.GuiTests.Windows/SalmonEgg.GuiTests.Windows.csproj
          --filter "FullyQualifiedName~SelectAcrossProfilesAndLocal_OneSecondCadence_FinalIntentAlwaysWins"
          -v minimal

